<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/knockout/3.5.1/knockout-latest.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700&display=swap" rel="stylesheet">

    <title>Scouts 1st Worcester Noticeboard</title>

    <style>
        body {
            font-family: 'Nunito Sans', sans-serif !important;
            background-image: url('images/backgrounds/background.jpg'); /* Replace with the actual image path */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .card {
            background-color: rgba(255, 255, 255, 0.9); /* Semi-transparent white */
        }
        .header-section {
            background-color: #00A794;
            color: white;
            padding: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1030; /* Ensure it stays above other content */
        }
        .container-fluid {
            padding-top: 8rem; /* Maintain padding to avoid overlap with the fixed header */
        }

        img.sectionLogo {
            width: 200px;  /* Set your desired size */
            height: 40px; /* Set your desired size */
            object-fit: cover;
            object-position: center;
        }
    </style>
</head>

<body>
    <div class="header-section d-flex justify-content-between align-items-center" data-bind="with: currentSection">
        <!--<h1 class="display-4" data-bind="text: sectionType"></h1>-->
        <img class="sectionLogo" data-bind="attr: { src: sectionLogo, alt: sectionType }">
        <h2 data-bind="text: groupName"></h2>
    </div>

    <div class="container-fluid">
        <div class="row g-4">
            <!-- Now Section -->
            <div class="col-md-6 col-lg-4" data-bind="with: currentSession">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Now:</h5>
                        <h3 data-bind="text: title" class="card-subtitle mb-2 text-primary"></h3>
                        <p class="card-text">
                            <span class="fw-bold">Time:</span>
                            <span data-bind="text: startTime"></span> until
                            <span data-bind="text: endTime"></span> on
                            <span data-bind="text: date"></span>
                            <p data-bind="text: notesForParents"></p>
                        </p>
                    </div>
                    <div class="card-footer text-muted">
                        <div data-bind="foreach: badges">
                            <span class="badge rounded-pill bg-primary me-1" data-bind="text: $data"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Next Section -->
            <div class="col-md-6 col-lg-4" data-bind="with: nextSession">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Next time:</h5>
                        <h3 data-bind="text: title" class="card-subtitle mb-2 text-success"></h3>
                        <p class="card-text">
                            <span class="fw-bold">Time:</span>
                            <span data-bind="text: startTime"></span> until
                            <span data-bind="text: endTime"></span> on
                            <span data-bind="text: date"></span>
                            <p data-bind="text: notesForParents"></p>
                        </p>
                    </div>
                    <div class="card-footer text-muted">
                        <div data-bind="foreach: badges">
                            <span class="badge rounded-pill bg-primary me-1" data-bind="text: $data"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Upcoming Events Section -->
            <div class="col-12 col-lg-4" data-bind="with: upcomingEvents">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold text-primary">Upcoming Events</h5>
                        <ul class="list-group list-group-flush" data-bind="foreach: eventList">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <span class="fw-bold" data-bind="text: title">Event Title</span>
                                <span class="text-muted small" data-bind="text: date">DD/MM/YYYY</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="Index.js"></script>
    <script src="refresh.js"></script> <!-- External script for auto-refresh -->

</body>

</html>
